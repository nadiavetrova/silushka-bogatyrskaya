name: Daily Database Backup

on:
  schedule:
    # Каждый день в 3:00 ночи по Москве (00:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: # Ручной запуск

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL 18 client
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg2
          echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18 || sudo apt-get install -y postgresql-client-16

      - name: Create backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_PUBLIC_URL }}
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          pg_dump "$DATABASE_URL" -F c -f "backup_${TIMESTAMP}.dump"
          echo "BACKUP_FILE=backup_${TIMESTAMP}.dump" >> $GITHUB_ENV
          echo "✅ Backup created: backup_${TIMESTAMP}.dump"
          ls -lh "backup_${TIMESTAMP}.dump"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 30
